<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BizTrack — Business Payment Control</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;background:#f5f6fa;color:#1a1f36}

/* ── App shell ─────────────────────────────────────────── */
.app{display:flex;height:100vh;overflow:hidden}

/* ── Sidebar ───────────────────────────────────────────── */
.sb{width:252px;min-width:252px;background:#ffffff;display:flex;flex-direction:column;overflow-y:auto;border-right:1px solid #e8eaf0;flex-shrink:0}
.sb::-webkit-scrollbar{width:3px}
.sb::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:2px}

.sb-logo{padding:18px 18px 14px;border-bottom:1px solid #f0f1f5;display:flex;align-items:center;gap:10px;flex-shrink:0}
.sb-logo svg{width:34px;height:34px;flex-shrink:0}
.sb-logo-name{font-size:16px;font-weight:800;color:#1a1f36;line-height:1.2;letter-spacing:-.3px}
.sb-logo-sub{font-size:10px;color:#9ca3af;margin-top:1px}

/* Wave-style "Create new" — blue circle + bold blue text, no border */
.sb-create{margin:16px 16px 6px;padding:2px 4px;background:none;border:none;color:#2B5EEB;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:10px;transition:opacity .12s}
.sb-create:hover{opacity:.75;background:none}
.sb-create-circle{width:26px;height:26px;background:#2B5EEB;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-create-circle svg{width:14px;height:14px}

.sb-grp{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#c0c8d8;padding:12px 18px 3px}

/* Wave-style nav items: dark navy text, rounded rect hover/active, no left border */
.sb-item{display:flex;align-items:center;gap:12px;margin:1px 8px;padding:10px 12px;color:#1a2e5a;cursor:pointer;font-size:14px;font-weight:500;border-left:none;border-radius:8px;transition:background .1s,color .1s;user-select:none}
.sb-item:hover{color:#1a1f36;background:#eef2fd}
.sb-item.active{color:#1a1f36;background:#dce8f8;font-weight:700}
.sb-item svg{width:19px;height:19px;flex-shrink:0;color:#5b96cc}
.sb-item.active svg{color:#2B5EEB}
.sb-item span{flex:1}

/* "New" green badge */
.sb-new-badge{font-size:9px;font-weight:700;color:#fff;background:#34c759;border-radius:10px;padding:2px 7px;letter-spacing:.3px;flex-shrink:0}

/* Accept payments promo card */
.sb-promo{margin:8px 12px 0;padding:12px 14px;background:#f4f7ff;border:1.5px solid #d0ddfb;border-radius:10px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .12s}
.sb-promo:hover{background:#e8eeff}
.sb-promo-icon{width:36px;height:36px;flex-shrink:0;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;border:1px solid #d0ddfb}
.sb-promo-icon svg{width:18px;height:18px;color:#2B5EEB}
.sb-promo-text{flex:1}
.sb-promo-label{font-size:12.5px;font-weight:700;color:#2B5EEB;line-height:1.3}
.sb-promo-sub{font-size:10px;color:#7a8fc4;margin-top:1px}
.sb-promo-arrow{color:#2B5EEB;font-size:16px;font-weight:300}

.sb-footer{margin-top:auto;padding:10px 14px 14px;border-top:1px solid #f0f1f5}
.sb-footer-info{font-size:10px;color:#b0b7c3;margin-bottom:6px;padding:0 4px}
.btn-danger{width:100%;padding:7px;background:transparent;border:1px solid #e5e7eb;border-radius:6px;color:#b0b7c3;font-size:11px;cursor:pointer;transition:all .12s}
.btn-danger:hover{border-color:#dc2626;color:#dc2626;background:rgba(220,38,38,.05)}

/* ── Content area ──────────────────────────────────────── */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

.ch{background:#fff;border-bottom:1px solid #e8eaf0;padding:11px 22px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
.ch-left h2{font-size:15px;font-weight:700;color:#1a1f36;line-height:1.2}
.ch-left p{font-size:11px;color:#9ca3af;margin-top:1px}
.ch-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.biz-badge{display:flex;align-items:center;gap:8px}
.biz-badge-name{font-size:12px;font-weight:600;color:#1a1f36}
.biz-tier{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#2B5EEB;background:#eef2fd;border:1px solid #c7d5fb;border-radius:4px;padding:2px 6px}

.period-sel{padding:6px 9px;background:#fff;border:1px solid #d1d5db;border-radius:6px;font-size:12px;color:#374151;cursor:pointer;outline:none}
.period-sel:focus{border-color:#3b82f6}

.btn-sm{padding:6px 12px;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;transition:opacity .12s}
.btn-dark{background:#1e2540;color:#fff}
.btn-dark:hover{opacity:.85}
.btn-outline{background:#fff;color:#374151;border:1px solid #d1d5db}
.btn-outline:hover{background:#f9fafb}

.cb{flex:1;overflow-y:auto;padding:18px 22px}
.cb::-webkit-scrollbar{width:6px}
.cb::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}

/* ── Excel-like tables ─────────────────────────────────── */
.xl-wrap{background:#fff;border:1px solid #d1d5db;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow-x:auto}
.xl-table{width:100%;border-collapse:collapse;font-size:12.5px}

.xl-table .xl-hdr th{background:#1e2540;color:#e5e7eb;padding:8px 10px;border:1px solid #2d3660;font-size:11px;font-weight:600;text-align:left;white-space:nowrap;position:sticky;top:0;z-index:5;cursor:pointer;user-select:none}
.xl-table .xl-hdr th:hover{background:#263060}
.xl-hdr th.s-asc::after{content:' ↑';color:#93c5fd}
.xl-hdr th.s-desc::after{content:' ↓';color:#93c5fd}
.xl-hdr .xl-rn{background:#111827!important;color:#4b5563!important;cursor:default!important}
.xl-hdr .xl-rn:hover{background:#111827!important}
.xl-hdr .no-sort{cursor:default!important}

.xl-rn{background:#f3f4f6!important;color:#9ca3af!important;text-align:center!important;font-size:10.5px!important;width:36px;min-width:36px;border-color:#e5e7eb!important;font-weight:400!important}

.xl-table tbody tr td{padding:6px 10px;border:1px solid #e5e7eb;color:#374151;transition:background .07s}
.xl-table tbody tr:nth-child(odd) td{background:#fff}
.xl-table tbody tr:nth-child(even) td{background:#f9fafb}
.xl-table tbody tr:hover td{background:#eff6ff!important}

.xl-num{text-align:right!important;font-variant-numeric:tabular-nums;font-family:'Consolas','Courier New',monospace;font-size:12px}
.pos{color:#166534!important;font-weight:600}
.neg{color:#991b1b!important;font-weight:600}

/* Statement row variants */
.xl-stmt-title td{background:#fff!important;font-size:15px;font-weight:800;color:#111827!important;border:none!important;padding:16px 12px 3px!important}
.xl-stmt-sub td{background:#fff!important;font-size:11px;color:#6b7280!important;border:none!important;padding:0 12px 14px!important}
.xl-spacer td{background:#f3f4f6!important;height:6px;padding:0!important;border:none!important;border-bottom:1px solid #e5e7eb!important}
.xl-section td{background:#1e2540!important;color:#fff!important;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.8px;padding:7px 10px!important;border:1px solid #2d3660!important}
.xl-indent td:nth-child(2){padding-left:26px!important}
.xl-subtotal td{background:#dbeafe!important;font-weight:700!important;color:#1e3a5f!important;border-top:2px solid #3b82f6!important}
.xl-total td{background:#1e2540!important;color:#fff!important;font-weight:800!important;font-size:13px!important;border:1px solid #2d3660!important}
.xl-net-pos td{background:#dcfce7!important;color:#166534!important;font-weight:800!important;font-size:13px!important;border-top:3px double #16a34a!important}
.xl-net-neg td{background:#fee2e2!important;color:#991b1b!important;font-weight:800!important;font-size:13px!important;border-top:3px double #dc2626!important}
.xl-month-cur td{font-weight:700}

/* ── Dashboard ─────────────────────────────────────────── */
.dash-page-title{font-size:28px;font-weight:800;color:#1a1f36;margin-bottom:6px;letter-spacing:-.5px}
.dash-page-sub{font-size:13px;color:#9ca3af;margin-bottom:20px}

.dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.dash-card{background:#fff;border:1px solid #e8eaf0;border-radius:10px;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.dash-card-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#9ca3af;margin-bottom:6px}
.dash-card-val{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1;color:#1a1f36}
.dash-card-sub{font-size:10px;color:#b0b7c3;margin-top:5px}
.dash-card-val.pos{color:#0e7f4f}
.dash-card-val.neg{color:#d93025}

/* Wave-style two-column mid section */
.dash-mid{display:grid;grid-template-columns:1fr 2fr;gap:16px;margin-bottom:20px;align-items:start}
.dash-todo{background:#fff;border:1px solid #e8eaf0;border-radius:10px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.dash-todo-title{font-size:13px;font-weight:700;color:#1a1f36;margin-bottom:14px}
.dash-todo-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f3f4f6;cursor:pointer;transition:background .1s}
.dash-todo-item:last-child{border-bottom:none}
.dash-todo-item:hover .dash-todo-label{color:#2B5EEB}
.dash-todo-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dash-todo-icon svg{width:15px;height:15px}
.dash-todo-label{font-size:12.5px;font-weight:600;color:#374151}
.dash-todo-desc{font-size:10.5px;color:#9ca3af;margin-top:1px}

.dash-cf{background:#fff;border:1px solid #e8eaf0;border-radius:10px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.dash-cf-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.dash-cf-title{font-size:14px;font-weight:700;color:#1a1f36}
.dash-cf-sub{font-size:11px;color:#9ca3af;margin-bottom:14px}
.dash-cf-legend{display:flex;gap:14px;margin-bottom:10px}
.dash-cf-leg-item{display:flex;align-items:center;gap:5px;font-size:10.5px;color:#6b7280}
.dash-cf-leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.dash-cf-wrap{position:relative;height:200px}

/* P&L section */
.dash-pl{background:#fff;border:1px solid #e8eaf0;border-radius:10px;padding:18px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.dash-pl-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.dash-pl-title{font-size:14px;font-weight:700;color:#1a1f36}
.dash-pl-sub{font-size:11px;color:#9ca3af;margin-bottom:14px}
.dash-pl-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px}
.dash-pl-stat{padding:12px 14px;border-radius:8px;border:1px solid #f0f1f5}
.dash-pl-stat-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#9ca3af;margin-bottom:5px}
.dash-pl-stat-val{font-size:18px;font-weight:800;font-variant-numeric:tabular-nums}
.dash-pl-wrap{position:relative;height:160px}

.dash-charts{display:grid;grid-template-columns:3fr 2fr;gap:14px;margin-bottom:18px}
.dash-cc{background:#fff;border:1px solid #e8eaf0;border-radius:10px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.dash-cc-title{font-size:11px;font-weight:700;color:#374151;margin-bottom:10px;text-transform:uppercase;letter-spacing:.4px}
.dash-cc-wrap{position:relative;height:200px}

/* Income vs Expense chart */
.dash-ie{background:#fff;border:1px solid #e8eaf0;border-radius:10px;padding:18px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.dash-ie-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.dash-ie-legend{display:flex;gap:16px}
.dash-ie-leg{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:#6b7280}
.dash-ie-leg-dot{width:12px;height:10px;border-radius:2px;flex-shrink:0}
.dash-ie-toggle{display:flex;gap:2px}
.dash-ie-tog-btn{font-size:11px;font-weight:600;padding:3px 11px;border-radius:5px;border:none;cursor:pointer;color:#9ca3af;background:transparent;transition:color .12s}
.dash-ie-tog-btn.on{color:#2B5EEB}
.dash-ie-wrap{position:relative;height:230px}

/* Payable/Owing + Net Income row */
.dash-po-row{display:grid;grid-template-columns:3fr 2fr;gap:16px;margin-bottom:20px;align-items:start}

.dash-po{background:#fff;border:1px solid #e8eaf0;border-radius:10px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.dash-po-title{font-size:17px;font-weight:700;color:#1a1f36;margin-bottom:16px}
.dash-po-cols{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.dash-po-col-hdr{font-size:12.5px;font-weight:700;color:#1a1f36;padding-bottom:8px;border-bottom:2px solid #e8eaf0;margin-bottom:2px}
.dash-po-li{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:12.5px}
.dash-po-li:last-child{border-bottom:none}
.dash-po-li .lbl-blue{color:#2B5EEB;font-weight:600}
.dash-po-li .lbl-gray{color:#6b7280}
.dash-po-li .val{font-weight:600;font-variant-numeric:tabular-nums;color:#1a1f36}

.dash-ni{background:#fff;border:1px solid #e8eaf0;border-radius:10px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.dash-ni-title{font-size:17px;font-weight:700;color:#1a1f36;margin-bottom:16px}
.dash-ni-tbl{width:100%;border-collapse:collapse}
.dash-ni-tbl th{font-size:11px;font-weight:700;color:#6b7280;padding:7px 10px;border-bottom:2px solid #e8eaf0;text-align:right}
.dash-ni-tbl th:first-child{text-align:left}
.dash-ni-tbl td{font-size:13px;padding:9px 10px;border-bottom:1px solid #f3f4f6;color:#374151}
.dash-ni-tbl td:not(:first-child){text-align:right;font-weight:700;color:#2B5EEB;font-variant-numeric:tabular-nums}
.dash-ni-tbl tr.ni-alt td{background:#f5f7ff}
.dash-ni-tbl tr.ni-net td{font-weight:800;border-top:2px solid #e8eaf0;border-bottom:none;font-size:13.5px}

/* Expense Breakdown */
.dash-exp{background:#fff;border:1px solid #e8eaf0;border-radius:10px;padding:18px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.dash-exp-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.dash-exp-title{font-size:14px;font-weight:700;color:#1a1f36}
.dash-exp-toggle{display:flex;gap:2px}
.dash-exp-tog-btn{font-size:11px;font-weight:600;padding:3px 11px;border-radius:5px;border:none;cursor:pointer;color:#9ca3af;background:transparent;transition:color .12s}
.dash-exp-tog-btn.on{color:#2B5EEB}
.dash-exp-body{display:grid;grid-template-columns:240px 1fr;gap:24px;align-items:center}
.dash-exp-wrap{position:relative;height:230px}
.dash-exp-leg-list{display:flex;flex-direction:column;gap:7px}
.dash-exp-leg-item{display:flex;align-items:center;gap:8px;font-size:12px}
.dash-exp-leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dash-exp-leg-lbl{flex:1;color:#374151}
.dash-exp-leg-pct{font-size:10.5px;font-weight:700;color:#9ca3af;min-width:36px;text-align:right}
.dash-exp-leg-val{font-size:10.5px;color:#6b7280;font-variant-numeric:tabular-nums;min-width:64px;text-align:right}

.view-title{font-size:12px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;margin-top:4px}

/* ── Forms ─────────────────────────────────────────────── */
.form-card{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:22px;max-width:580px}
.form-hdr{font-size:13px;font-weight:700;color:#111827;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid #f3f4f6}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg.full{grid-column:1/-1}
.fg label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#6b7280}
.fi{padding:8px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;color:#111827;background:#fff;outline:none;transition:border-color .12s;width:100%}
.fi:focus{border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,.1)}
.fi option{background:#fff}

.type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.tt-btn{padding:9px;border:1px solid #d1d5db;border-radius:7px;background:#fff;color:#6b7280;font-size:13px;font-weight:600;cursor:pointer;transition:all .12s;text-align:center}
.tt-btn.inc.on{background:#dcfce7;border-color:#16a34a;color:#166534}
.tt-btn.exp.on{background:#fee2e2;border-color:#dc2626;color:#991b1b}

.btn-submit{margin-top:16px;padding:10px 22px;background:#1e2540;border:none;border-radius:7px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .12s}
.btn-submit:hover{opacity:.85}
.btn-submit.green{background:#15803d}
.btn-submit.green:hover{opacity:.9}

/* ── Filter bar ────────────────────────────────────────── */
.fbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.fi-sm{padding:5px 9px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;color:#374151;background:#fff;outline:none}
.fi-sm:focus{border-color:#3b82f6}
.fbar-count{margin-left:auto;font-size:11px;color:#9ca3af}

/* ── Type badge ────────────────────────────────────────── */
.badge-inc{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;background:#dcfce7;color:#166534}
.badge-exp{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;background:#fee2e2;color:#991b1b}

/* ── Delete btn ────────────────────────────────────────── */
.del-btn{background:none;border:none;color:#d1d5db;cursor:pointer;font-size:16px;line-height:1;padding:0 3px;transition:color .1s}
.del-btn:hover{color:#dc2626}

/* ── Toast ─────────────────────────────────────────────── */
.toast{position:fixed;bottom:22px;right:22px;background:#1e2540;border:1px solid #16a34a;border-radius:8px;padding:10px 18px;font-size:12px;font-weight:500;color:#4ade80;z-index:999;transform:translateY(60px);opacity:0;transition:all .25s;pointer-events:none}
.toast.on{transform:translateY(0);opacity:1}

/* ── Print ─────────────────────────────────────────────── */
@media print{
  .sb,.ch{display:none!important}
  .content{overflow:visible!important}
  .cb{overflow:visible!important;padding:0!important}
  .xl-wrap{box-shadow:none!important;border:none!important}
  .xl-table .xl-hdr th{background:#1e2540!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}

/* ── Hamburger btn (hidden on desktop) ─────────────────── */
.mob-menu{display:none;align-items:center;justify-content:center;width:36px;height:36px;background:none;border:1px solid #e5e7eb;border-radius:7px;cursor:pointer;flex-shrink:0;color:#374151}
.mob-menu svg{width:18px;height:18px}

/* ── Sidebar overlay (mobile) ──────────────────────────── */
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199;backdrop-filter:blur(1px)}
.sb-overlay.on{display:block}

/* ── Sidebar close btn (mobile only) ───────────────────── */
.sb-close{display:none;position:absolute;top:14px;right:12px;background:none;border:none;color:#9ca3af;font-size:20px;cursor:pointer;line-height:1;padding:2px 6px}
.sb-close:hover{color:#1a1f36}

/* ── Tablet ─────────────────────────────────────────────── */
@media(max-width:860px){
  .dash-grid{grid-template-columns:1fr 1fr}
  .dash-mid{grid-template-columns:1fr}
  .dash-charts{grid-template-columns:1fr}
  .dash-pl-stats{grid-template-columns:1fr 1fr 1fr}
  .dash-po-row{grid-template-columns:1fr}
  .dash-exp-body{grid-template-columns:1fr;justify-items:center}

/* ── Mobile ─────────────────────────────────────────────── */
@media(max-width:640px){

  .dash-po-cols{grid-template-columns:1fr;gap:12px}
  .dash-exp-body{grid-template-columns:1fr}

  .biz-badge{display:none}

  /* Forms → single column */
  .form-card{max-width:100%;padding:16px}

  .fg.full{grid-column:1}
  .btn-submit{width:100%;margin-top:12px}

  .fbar{gap:6px}

  /* Toast above nav bar */

  /* Bottom navigation bar */
  .bot-nav{display:flex}
}

/* ── Bottom nav bar ─────────────────────────────────────── */
.bot-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e8eaf0;z-index:100;justify-content:space-around;padding:6px 0 max(6px,env(safe-area-inset-bottom))}
.bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 10px;cursor:pointer;color:#9ca3af;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;border:none;background:none;min-width:52px;transition:color .12s}
.bn-item svg{width:18px;height:18px}

/* Push content up so bottom nav doesn't overlap */

<script>
// ═══ Data ══════════════════════════════════════════════════
let txs = JSON.parse(localStorage.getItem('biz_txs') || '[]');
let biz = { name:'My Business', type:'Sole Trader', industry:'', currency:'USD', yearStart:'January', address:'', phone:'', email:'', smsEnabled:false, smsPhone:'', ...JSON.parse(localStorage.getItem('biz_profile') || '{}') };

// Migrate old transactions that lack saleAmt/paidAmt fields
txs = txs.map(t => {
  if (t.type === 'income' && !('saleAmt' in t)) {
    return { ...t, saleAmt: t.amount ?? 0, paidAmt: t.amount ?? 0 };
  }
  if (t.type === 'expense' && !('amount' in t)) {
    return { ...t, amount: 0 };
  }
  return t;
});

// ═══ UI State ══════════════════════════════════════════════
let curView = 'dashboard';
let sortKey = 'date'; let sortAsc = false;
let lSearch = ''; let lCat = '';
let addType = 'income';
let charts = {};

function save() {
  localStorage.setItem('biz_txs', JSON.stringify(txs));
  localStorage.setItem('biz_profile', JSON.stringify(biz));
  document.getElementById('sbInfo').textContent = txs.length + ' transaction' + (txs.length !== 1 ? 's' : '');
  const nb = document.getElementById('chBizName');
  if(nb) nb.textContent = biz.name || 'My Business';
}

// ═══ Helpers ═══════════════════════════════════════════════
function toDS(d) { return d.toISOString().split('T')[0]; }
function parseDL(s) { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function money(n) {
  const sym = {USD:'$',EUR:'€',GBP:'£',JPY:'¥',AUD:'A$',CAD:'C$',CHF:'Fr',INR:'₹'}[biz.currency]||'$';
  return sym + Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function sd(s) { return parseDL(s).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'}); }
function sdLong(s) { return parseDL(s).toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}); }
function mLabel(y,m) { return new Date(y,m,1).toLocaleDateString('en-US',{month:'short',year:'numeric'}); }
function signVal(n) { return (n<0?'-':'')+money(n); }
function cls(n) { return n>0?'pos':n<0?'neg':''; }

// Per-transaction field accessor (handles old and new data shapes)
function txAmts(t) {
  if (t.type === 'income') {
    const saleAmt = t.saleAmt ?? t.amount ?? 0;
    const paidAmt = t.paidAmt ?? t.amount ?? 0;
    return { saleAmt, paidAmt, owed: +(saleAmt - paidAmt).toFixed(2), expAmt: 0 };
  }
  return { saleAmt: 0, paidAmt: 0, owed: 0, expAmt: t.amount ?? 0 };
}

// Summarise a list of transactions
function sum(list) {
  let saleAmt=0, paidAmt=0, owed=0, expAmt=0;
  list.forEach(t => { const a=txAmts(t); saleAmt+=a.saleAmt; paidAmt+=a.paidAmt; owed+=a.owed; expAmt+=a.expAmt; });
  return { saleAmt:+saleAmt.toFixed(2), paidAmt:+paidAmt.toFixed(2),
           owed:+owed.toFixed(2), expAmt:+expAmt.toFixed(2),
           net:+(paidAmt-expAmt).toFixed(2) };
}

// ═══ Period filter ══════════════════════════════════════════
function periodTxs() {
  const p = document.getElementById('periodSel')?.value || 'all';
  if (p==='all') return [...txs];
  const now=new Date(); let s,e;
  if (p==='today') {
    s=new Date(now.getFullYear(),now.getMonth(),now.getDate());
    e=new Date(now.getFullYear(),now.getMonth(),now.getDate(),23,59,59,999);
  } else if (p==='week') {
    const dy=now.getDay();
    s=new Date(now); s.setDate(now.getDate()-(dy===0?6:dy-1)); s.setHours(0,0,0,0);
    e=new Date(s); e.setDate(s.getDate()+6); e.setHours(23,59,59,999);
  } else if (p==='month') {
    s=new Date(now.getFullYear(),now.getMonth(),1);
    e=new Date(now.getFullYear(),now.getMonth()+1,0,23,59,59,999);
  } else {
    s=new Date(now.getFullYear(),0,1);
    e=new Date(now.getFullYear(),11,31,23,59,59,999);
  }
  return txs.filter(t=>{ const d=parseDL(t.date); return d>=s && d<=e; });
}

// ═══ Navigation ════════════════════════════════════════════
const TITLES = {
  dashboard:['Dashboard','Overview of your business performance'],
  profile:['Business Profile','Your company details and settings'],
  add:['Add Transaction','Record a new sale or expense entry'],
  ledger:['Sales Ledger','Sales · Paid Amount · Amount Owed — with daily totals'],
  income:['Income Statement','Profit & Loss — Revenue vs Expenses'],
  balsheet:['Balance Sheet','Assets, Liabilities & Owner\'s Equity'],
  cashflow:['Cash Flow Statement','All cash movements with running balance'],
  monthly:['Monthly Report','Month-by-month P&L for the past 12 months'],
  category:['Category Report','Breakdown of transactions by category'],
};

function openSb()  { document.getElementById('sbDrawer').classList.add('open');  document.getElementById('sbOverlay').classList.add('on'); }
function closeSb() { document.getElementById('sbDrawer').classList.remove('open'); document.getElementById('sbOverlay').classList.remove('on'); }

function nav(v) {
  curView = v;
  document.querySelectorAll('.sb-item').forEach(el => el.classList.toggle('active', el.dataset.v===v));
  document.querySelectorAll('.bn-item').forEach(el => el.classList.toggle('active', el.dataset.v===v));
  const [title, sub] = TITLES[v] || [v,''];
  document.getElementById('pgTitle').textContent = title;
  document.getElementById('pgSub').textContent = sub;
  closeSb();
  render();
}

function render() {
  Object.values(charts).forEach(c=>c&&c.destroy&&c.destroy());
  charts = {};
  const cb = document.getElementById('cb');
  const ft = periodTxs();
  if      (curView==='dashboard') vDashboard(cb, ft);
  else if (curView==='profile')   vProfile(cb);
  else if (curView==='add')       vAdd(cb);
  else if (curView==='ledger')    vLedger(cb, ft);
  else if (curView==='income')    vIncome(cb, ft);
  else if (curView==='balsheet')  vBalSheet(cb, ft);
  else if (curView==='cashflow')  vCashflow(cb, ft);
  else if (curView==='monthly')   vMonthly(cb);
  else if (curView==='category')  vCategory(cb, ft);
}

// ═══ DASHBOARD ═════════════════════════════════════════════
function vDashboard(cb, ft) {
  const s = sum(ft);
  const period = document.getElementById('periodSel')?.value || 'month';
  const periodLabel = {all:'All Time',year:'This Year',month:'This Month',week:'This Week',today:'Today'}[period]||'This Period';

  // ── Cash Flow: last 30 days
  const cfMap={};
  const cfBase=new Date(); cfBase.setHours(0,0,0,0);
  for(let i=29;i>=0;i--){ const d=new Date(cfBase); d.setDate(cfBase.getDate()-i); cfMap[toDS(d)]={inflow:0,outflow:0}; }
  txs.forEach(t=>{
    if(!cfMap[t.date]) return;
    const a=txAmts(t);
    cfMap[t.date].inflow+=a.paidAmt;
    cfMap[t.date].outflow+=a.expAmt;
  });
  const cfDates=Object.keys(cfMap).sort();
  const cfInflow=cfDates.map(k=>cfMap[k].inflow);
  const cfOutflow=cfDates.map(k=>cfMap[k].outflow);
  let cumNet=0;
  const cfNet=cfDates.map(k=>{ cumNet+=cfMap[k].inflow-cfMap[k].outflow; return +cumNet.toFixed(2); });

  // ── P&L: last 6 months
  const plMap={};
  for(let i=5;i>=0;i--){
    const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()-i);
    plMap[`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`]={rev:0,exp:0};
  }
  txs.forEach(t=>{
    const ym=t.date.slice(0,7);
    if(!plMap[ym]) return;
    const a=txAmts(t);
    plMap[ym].rev+=a.paidAmt; plMap[ym].exp+=a.expAmt;
  });
  const plKeys=Object.keys(plMap).sort();
  const plLabels=plKeys.map(k=>{ const [y,m]=k.split('-'); return new Date(+y,+m-1,1).toLocaleDateString('en-US',{month:'short'}); });
  const plRev=plKeys.map(k=>plMap[k].rev);
  const plExp=plKeys.map(k=>plMap[k].exp);
  const plNet=plKeys.map(k=>+(plMap[k].rev-plMap[k].exp).toFixed(2));

  // ── Income vs Expense: last N months
  const ieN = window._dashIEMonths || 12;
  const ieMap={};
  for(let i=ieN-1;i>=0;i--){
    const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()-i);
    ieMap[`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`]={inc:0,exp:0};
  }
  txs.forEach(t=>{
    const ym=t.date.slice(0,7);
    if(!ieMap[ym]) return;
    const a=txAmts(t);
    ieMap[ym].inc+=a.paidAmt; ieMap[ym].exp+=a.expAmt;
  });
  const ieKeys=Object.keys(ieMap).sort();
  const ieLabels=ieKeys.map(k=>{ const [y,m]=k.split('-'); return new Date(+y,+m-1,1).toLocaleDateString('en-US',{month:'short',year:'2-digit'}); });
  const ieInc=ieKeys.map(k=>ieMap[k].inc);
  const ieExp=ieKeys.map(k=>ieMap[k].exp);

  // ── AR Aging (invoices payable to you — 30-day net terms assumed)
  const today=new Date(); today.setHours(0,0,0,0);
  const ar={due:0,d30:0,d60:0,d90:0,d90p:0};
  txs.forEach(t=>{
    if(t.type!=='income') return;
    const a=txAmts(t); if(a.owed<=0) return;
    const due=new Date(parseDL(t.date)); due.setDate(due.getDate()+30);
    const late=Math.floor((today-due)/(86400000));
    if(late<=0)       ar.due +=a.owed;
    else if(late<=30) ar.d30 +=a.owed;
    else if(late<=60) ar.d60 +=a.owed;
    else if(late<=90) ar.d90 +=a.owed;
    else              ar.d90p+=a.owed;
  });

  // ── Net Income: fiscal year comparison
  const curYear=new Date().getFullYear();
  const prevYear=curYear-1;
  const fySum=yr=>sum(txs.filter(t=>t.date.startsWith(yr+'')));

  // ── Expense Breakdown by category

    if(t.type!=='expense') return false;

    return t.date.slice(0,7)===`${now2.getFullYear()}-${String(now2.getMonth()+1).padStart(2,'0')}`;
  });
  const expByCat={};
  expTxs.forEach(t=>{ expByCat[t.cat]=(expByCat[t.cat]||0)+(t.amount||0); });
  const expCatKeys=Object.keys(expByCat).sort((a,b)=>expByCat[b]-expByCat[a]);
  const expTotal=expCatKeys.reduce((s,k)=>s+expByCat[k],0);
  const PIE_COLORS=['#4caf77','#2B5EEB','#9ca3af','#f59e0b','#7c3aed','#dc2626','#0ea5e9','#d97706','#ec4899'];

    </div>
    <div class="dash-card">

  <div class="dash-mid">

        <div><div class="dash-todo-label">Record a Transaction</div><div class="dash-todo-desc">Add a sale or expense entry</div></div>
      </div>

        </div>
        <div><div class="dash-todo-label">View Sales Ledger</div><div class="dash-todo-desc">Daily grouped transactions</div></div>
      </div>
      <div class="dash-todo-item" onclick="nav('income')">

        </div>

      <div class="dash-todo-item" onclick="nav('balsheet')">

        </div>
        <div><div class="dash-todo-label">Balance Sheet</div><div class="dash-todo-desc">Assets, liabilities &amp; equity</div></div>

      <div class="dash-todo-item" onclick="nav('profile')">
        <div class="dash-todo-icon" style="background:#fef2f2">
          <svg viewBox="0 0 15 15" fill="none" stroke="#dc2626" stroke-width="1.6" stroke-linecap="round"><circle cx="7.5" cy="5" r="2.5"/><path d="M2 13c0-3 2.5-5 5.5-5s5.5 2 5.5 5"/></svg>
        </div>
        <div><div class="dash-todo-label">Business Profile</div><div class="dash-todo-desc">Update your company details</div></div>
      </div>
    </div>

    <div class="dash-cf">
      <div class="dash-cf-hdr"><div class="dash-cf-title">Cash Flow</div></div>
      <div class="dash-cf-sub">Last 30 days · inflow vs outflow vs cumulative net</div>
      <div class="dash-cf-legend">
        <div class="dash-cf-leg-item"><div class="dash-cf-leg-dot" style="background:#4caf77"></div>Inflow</div>

          <div class="dash-po-li"><span class="lbl-gray">61–90 days overdue</span><span class="val">${money(0)}</span></div>
          <div class="dash-po-li"><span class="lbl-gray">&gt; 90 days overdue</span><span class="val">${money(0)}</span></div>

  <!-- Expense Breakdown -->
  <div class="dash-exp">

  // ── Cash Flow chart

  if(cfCtx){

function recentTable(rows) {
  if (!rows.length) return '<div style="padding:28px;text-align:center;color:#9ca3af;font-style:italic;">No transactions yet. <a onclick="nav(\'add\')" style="color:#3b82f6;cursor:pointer;text-decoration:underline;">Add one →</a></div>';
  return `<table class="xl-table">
    <thead><tr class="xl-hdr">
      <th class="xl-rn no-sort">#</th><th>Date</th><th>Type</th><th>Category</th><th>Description</th>
      <th class="xl-num no-sort">Sale Amt</th><th class="xl-num no-sort">Paid</th><th class="xl-num no-sort">Owed</th>
    </tr></thead>
    <tbody>${rows.map((t,i)=>{ const a=txAmts(t); return `<tr>
      <td class="xl-rn">${i+1}</td>
      <td>${sd(t.date)}</td>
      <td><span class="${t.type==='income'?'badge-inc':'badge-exp'}">${t.type==='income'?'↑ Sale':'↓ Expense'}</span></td>
      <td>${esc(t.cat)}</td><td>${esc(t.desc)}</td>
      <td class="xl-num">${a.saleAmt>0?money(a.saleAmt):'—'}</td>
      <td class="xl-num pos">${a.paidAmt>0?money(a.paidAmt):a.expAmt>0?`<span class="neg">-${money(a.expAmt)}</span>`:'—'}</td>
      <td class="xl-num ${a.owed>0?'neg':''}">${a.owed>0?money(a.owed):'—'}</td>
    </tr>`; }).join('')}</tbody>
  </table>`;
}

function setAddType(t) { addType=t; vAdd(document.getElementById('cb')); }

function submitTx() {
  const date=document.getElementById('fDate').value;
  const cat=document.getElementById('fCat').value;
  const ref=document.getElementById('fRef')?.value.trim()||'';
  const desc=document.getElementById('fDesc').value.trim();
  const notes=document.getElementById('fNotes')?.value.trim()||'';
  if (!date){ alert('Date required.'); return; }
  if (!cat){ alert('Select a category.'); return; }
  if (!desc){ alert('Description required.'); return; }

  let newTx;
  if (addType==='income') {
    const saleAmt=parseFloat(document.getElementById('fSaleAmt').value);
    const paidAmt=parseFloat(document.getElementById('fPaidAmt').value)||0;
    if (!saleAmt||saleAmt<=0){ alert('Enter a valid sale amount.'); return; }
    if (paidAmt<0){ alert('Paid amount cannot be negative.'); return; }
    if (paidAmt>saleAmt){ alert('Paid amount cannot exceed the sale amount.'); return; }
    newTx={id:uid(),date,type:'income',cat,ref,desc,notes,saleAmt,paidAmt,amount:saleAmt};
  } else {
    const amount=parseFloat(document.getElementById('fAmt').value);
    if (!amount||amount<=0){ alert('Enter a valid amount.'); return; }
    newTx={id:uid(),date,type:'expense',cat,ref,desc,notes,amount,saleAmt:0,paidAmt:0};
  }
  txs.unshift(newTx);
  save(); toast('Transaction added ✓'); nav('ledger');
  sendSmsAlert(newTx);
}

// ═══ SMS ALERT ═════════════════════════════════════════════
async function sendSmsAlert(tx) {
  if (!biz.smsEnabled || !biz.smsPhone) return;
  const a = txAmts(tx);
  let msg;
  if (tx.type === 'income') {
    msg = `BizTrack ✓ New Sale\n${tx.desc}${tx.ref?' ('+tx.ref+')':''}\nSale: ${money(a.saleAmt)}  Paid: ${money(a.paidAmt)}  Owed: ${money(a.owed)}\nDate: ${tx.date}\n— ${biz.name}`;
  } else {
    msg = `BizTrack ✓ Expense\n${tx.desc}\nAmount: ${money(a.expAmt)}  Category: ${tx.cat}\nDate: ${tx.date}\n— ${biz.name}`;
  }
  try {
    const res = await fetch('/api/send-sms', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ to: biz.smsPhone, message: msg })
    });
    const data = await res.json();
    if (data.success) toast('SMS sent to ' + biz.smsPhone + ' ✓');
    else toast('SMS failed: ' + (data.error || 'unknown error'));
  } catch(e) {
    toast('SMS unavailable — is server.py running?');
  }
}

  const te=+Object.values(eCats).reduce((s,v)=>s+v,0).toFixed(2);

  const s=sum(ft);
  cb.innerHTML = `<div class="xl-wrap"><table class="xl-table">
    <colgroup><col style="width:36px"><col style="width:88px"><col style="width:70px"><col style="width:70px"><col style="width:120px"><col><col style="width:106px"><col style="width:106px"><col style="width:106px"><col style="width:32px"></colgroup>
    <thead><tr class="xl-hdr">
      <th class="xl-rn no-sort">#</th><th class="no-sort">Date</th><th class="no-sort">Ref #</th><th class="no-sort">Type</th><th class="no-sort">Category</th><th class="no-sort">Description</th>
      <th class="xl-num no-sort">Cash In</th><th class="xl-num no-sort">Cash Out</th><th class="xl-num no-sort">Running Balance</th><th class="no-sort"></th>
    </tr></thead>
    <tbody>
      <tr class="xl-stmt-title"><td></td><td colspan="9">${esc(biz.name)}</td></tr>
      <tr class="xl-stmt-sub"><td></td><td colspan="9">Cash Flow Statement &nbsp;|&nbsp; ${pLabel}</td></tr>
      <tr class="xl-spacer"><td colspan="10"></td></tr>
      <tr class="xl-section"><td></td><td colspan="9">Operating Activities</td></tr>
      ${rows||`<tr><td colspan="10" style="padding:32px;text-align:center;color:#9ca3af;font-style:italic;">No transactions in this period.</td></tr>`}
      <tr class="xl-spacer"><td colspan="10"></td></tr>
      <tr class="xl-total">
        <td class="xl-rn"></td><td colspan="5">NET CASH FLOW</td>
        <td class="xl-num pos">${money(s.paidAmt)}</td>
        <td class="xl-num neg">${money(s.expAmt)}</td>
        <td class="xl-num ${cls(bal)}">${signVal(bal)}</td><td></td>
      </tr>
    </tbody>
  </table></div>`;
}

// ═══ MONTHLY REPORT ════════════════════════════════════════
function vMonthly(cb) {
  const now=new Date(); let cumNet=0;
  const months=[];
  for(let i=11;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const y=d.getFullYear(),m=d.getMonth();
    const mt=txs.filter(t=>{ const td=parseDL(t.date); return td.getFullYear()===y&&td.getMonth()===m; });
    months.push({label:mLabel(y,m),y,m,s:sum(mt),count:mt.length,cur:y===now.getFullYear()&&m===now.getMonth()});
  }
  const rows=months.map((mo,i)=>{
    cumNet+=mo.s.net;
    return `<tr class="${mo.cur?'xl-month-cur':''}">
      <td class="xl-rn">${i+1}</td>
      <td>${mo.label}${mo.cur?'<span style="margin-left:6px;padding:1px 5px;border-radius:3px;font-size:9px;background:#dbeafe;color:#1d4ed8;font-weight:700;">CURRENT</span>':''}</td>
      <td style="text-align:center;color:#6b7280;font-size:11px;">${mo.count}</td>
      <td class="xl-num pos">${money(mo.s.saleAmt)}</td>
      <td class="xl-num pos">${money(mo.s.paidAmt)}</td>
      <td class="xl-num ${mo.s.owed>0?'neg':''}">${money(mo.s.owed)}</td>
      <td class="xl-num neg">${money(mo.s.expAmt)}</td>
      <td class="xl-num ${cls(mo.s.net)}">${signVal(mo.s.net)}</td>
      <td class="xl-num ${cls(cumNet)}">${signVal(cumNet)}</td>
    </tr>`;
  }).join('');
  const tot=months.reduce((a,mo)=>({saleAmt:a.saleAmt+mo.s.saleAmt,paidAmt:a.paidAmt+mo.s.paidAmt,owed:a.owed+mo.s.owed,expAmt:a.expAmt+mo.s.expAmt,net:a.net+mo.s.net}),{saleAmt:0,paidAmt:0,owed:0,expAmt:0,net:0});
  cb.innerHTML = `<div class="xl-wrap"><table class="xl-table">
    <colgroup><col style="width:36px"><col style="min-width:120px"><col style="width:58px"><col style="width:110px"><col style="width:110px"><col style="width:110px"><col style="width:110px"><col style="width:110px"><col style="width:110px"></colgroup>
    <thead><tr class="xl-hdr">
      <th class="xl-rn no-sort">#</th><th class="no-sort">Month</th><th style="text-align:center" class="no-sort">Txns</th>
      <th class="xl-num no-sort">Sales</th><th class="xl-num no-sort">Collected</th>
      <th class="xl-num no-sort">Owed</th><th class="xl-num no-sort">Expenses</th>
      <th class="xl-num no-sort">Net P&amp;L</th><th class="xl-num no-sort">Cumulative</th>
    </tr></thead>
    <tbody>
      <tr class="xl-stmt-title"><td></td><td colspan="8">${esc(biz.name)}</td></tr>
      <tr class="xl-stmt-sub"><td></td><td colspan="8">Monthly Report — 12 Months</td></tr>
      <tr class="xl-spacer"><td colspan="9"></td></tr>
      ${rows}
      <tr class="xl-spacer"><td colspan="9"></td></tr>
      <tr class="xl-total">
        <td class="xl-rn"></td><td>12-MONTH TOTAL</td>
        <td style="text-align:center;">${months.reduce((s,m)=>s+m.count,0)}</td>
        <td class="xl-num">${money(tot.saleAmt)}</td>
        <td class="xl-num">${money(tot.paidAmt)}</td>
        <td class="xl-num">${money(tot.owed)}</td>
        <td class="xl-num">${money(tot.expAmt)}</td>
        <td class="xl-num ${cls(tot.net)}">${signVal(tot.net)}</td>
        <td class="xl-num ${cls(cumNet)}">${signVal(cumNet)}</td>
      </tr>
    </tbody>
  </table></div>`;
}

// ═══ CATEGORY REPORT ═══════════════════════════════════════
function vCategory(cb, ft) {
  const pLabel = {all:'All Time',year:'This Year',month:'This Month',week:'This Week',today:'Today'}[document.getElementById('periodSel').value]||'';
  const byCat={};
  ft.forEach(t=>{
    const a=txAmts(t);
    if(!byCat[t.cat]) byCat[t.cat]={cat:t.cat,sale:0,paid:0,owed:0,exp:0,count:0};
    byCat[t.cat].sale+=a.saleAmt; byCat[t.cat].paid+=a.paidAmt;
    byCat[t.cat].owed+=a.owed;   byCat[t.cat].exp+=a.expAmt;
    byCat[t.cat].count++;
  });
  const cats=Object.values(byCat).sort((a,b)=>(b.sale+b.exp)-(a.sale+a.exp));
  const tot=cats.reduce((a,r)=>({sale:a.sale+r.sale,paid:a.paid+r.paid,owed:a.owed+r.owed,exp:a.exp+r.exp}),{sale:0,paid:0,owed:0,exp:0});
  const iCats=cats.filter(r=>r.sale>0), eCats=cats.filter(r=>r.exp>0);
  const catRows=(arr,rn)=>arr.map((r,i)=>`<tr class="xl-indent">
    <td class="xl-rn">${rn+i+1}</td><td>${esc(r.cat)}</td>
    <td style="text-align:center;color:#6b7280;font-size:11px;">${r.count}</td>
    <td class="xl-num pos">${r.sale>0?money(r.sale):'—'}</td>
    <td class="xl-num pos">${r.paid>0?money(r.paid):'—'}</td>
    <td class="xl-num ${r.owed>0?'neg':''}">${r.owed>0?money(r.owed):'—'}</td>
    <td class="xl-num neg">${r.exp>0?money(r.exp):'—'}</td>
  </tr>`).join('');
  cb.innerHTML = `<div class="xl-wrap"><table class="xl-table">
    <colgroup><col style="width:36px"><col style="min-width:160px"><col style="width:60px"><col style="width:116px"><col style="width:116px"><col style="width:116px"><col style="width:116px"></colgroup>
    <thead><tr class="xl-hdr">
      <th class="xl-rn no-sort">#</th><th class="no-sort">Category</th><th style="text-align:center" class="no-sort">Txns</th>
      <th class="xl-num no-sort">Sales</th><th class="xl-num no-sort">Collected</th>
      <th class="xl-num no-sort">Owed</th><th class="xl-num no-sort">Expenses</th>
    </tr></thead>
    <tbody>
      <tr class="xl-stmt-title"><td></td><td colspan="6">${esc(biz.name)}</td></tr>
      <tr class="xl-stmt-sub"><td></td><td colspan="6">Category Breakdown &nbsp;|&nbsp; ${pLabel}</td></tr>
      <tr class="xl-spacer"><td colspan="7"></td></tr>
      ${iCats.length?`<tr class="xl-section"><td></td><td colspan="6">Sales Categories</td></tr>${catRows(iCats,0)}`:''}
      ${iCats.length&&eCats.length?`<tr class="xl-spacer"><td colspan="7"></td></tr>`:''}
      ${eCats.length?`<tr class="xl-section"><td></td><td colspan="6">Expense Categories</td></tr>${catRows(eCats,iCats.length)}`:''}
      ${!cats.length?`<tr><td colspan="7" style="padding:32px;text-align:center;color:#9ca3af;font-style:italic;">No transactions in this period.</td></tr>`:''}
      <tr class="xl-spacer"><td colspan="7"></td></tr>
      <tr class="xl-total">
        <td class="xl-rn"></td><td>TOTALS</td>
        <td style="text-align:center;">${ft.length}</td>
        <td class="xl-num">${money(tot.sale)}</td>
        <td class="xl-num">${money(tot.paid)}</td>
        <td class="xl-num">${money(tot.owed)}</td>
        <td class="xl-num">${money(tot.exp)}</td>
      </tr>
    </tbody>
  </table></div>`;
}

// ═══ Utils ═════════════════════════════════════════════════
function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('on');
  setTimeout(()=>el.classList.remove('on'),2500);
}

function clearAll() {
  if (!txs.length) return;
  if (!confirm(`Delete all ${txs.length} transactions? This cannot be undone.`)) return;
  txs=[]; save(); toast('All data cleared.'); render();
}

function exportCSV() {
  const ft=periodTxs();
  if (!ft.length){ alert('No data to export.'); return; }
  const hdr=['Date','Type','Reference','Category','Description','Sale Amount','Paid Amount','Amount Owed','Expense Amount','Notes'];
  const rows=ft.map(t=>{
    const a=txAmts(t);
    return [t.date,t.type,t.ref||'',t.cat,t.desc,
      a.saleAmt.toFixed(2),a.paidAmt.toFixed(2),a.owed.toFixed(2),a.expAmt.toFixed(2),t.notes||''];
  });
  const csv=[hdr,...rows].map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download=`${biz.name.replace(/\s+/g,'_')}_${toDS(new Date())}.csv`;
  a.click();
}

// ═══ Boot ══════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', ()=>{ save(); nav('dashboard'); });
</script>
